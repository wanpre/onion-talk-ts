<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnionTalk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-light">
  <div id="loginForm" class="w-100 px-2 pt-4">
    <div class="card mb-4 shadow-lg mx-auto" style="max-width: 420px;">
      <div class="card-body">
        <h1 class="card-title mb-4 text-center">🧅 OnionTalk</h1>
        <div class="mb-3">
          <input type="text" id="username" class="form-control mb-2" placeholder="Username" autocomplete="off" required>
          <input type="text" id="room" class="form-control mb-2" placeholder="Room Name" autocomplete="off" required>
          <input type="password" id="password" class="form-control mb-2" placeholder="Room Password" autocomplete="off" required>
          <label class="form-check-label">
            <input type="checkbox" id="disclaimer" class="form-check-input" required>
            I have already read the <a href="https://github.com/nthnn/oniontalk/blob/main/DISCLAIMER.md" target="_blank" class="text-decoration-none">disclaimer notice</a>
          </label>
        </div>
        <div id="errorMessage" class="text-danger small mb-3"></div>
        <button id="joinBtn" class="btn btn-primary w-100">Join</button>
        <hr>
        <a href="https://github.com/nthnn/oniontalk" target="_blank" class="btn btn-dark w-100">GitHub</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="chatInterface" class="card shadow-lg d-none" style="max-width: 800px; margin: 0 auto;">
      <div class="card-body pt-2 mt-0">
        <h5 class="card-title w-100">
          <div class="row">
            <div class="col-6 pt-2">
              <span id="roomName"></span>
            </div>
            <div class="col-6 text-end">
              <button id="exitBtn" class="btn btn-danger btn-sm">Exit</button>
            </div>
          </div>
        </h5>
        <div id="messages" class="overflow-auto" style="height: 60vh;"></div>
        <div id="typingIndicator" class="text-muted small mb-2"></div>
        <div class="input-group">
          <input type="text" id="messageInput" class="form-control" placeholder="Type a message...">
          <button id="sendBtn" class="btn btn-primary">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
